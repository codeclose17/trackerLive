<app-day-progress-bar></app-day-progress-bar>
<app-inbox-fab (capture)="handleCaptureTask($event)"></app-inbox-fab>
<div class="app-shell">
  <!-- DESKTOP SIDEBAR NAV (>=1000px) -->
  <nav class="side-nav" aria-label="Main navigation">
    <div class="side-nav-brand">
      <span class="logo-icon">◐</span>
      <div>
        <h1>Cadence</h1>
        <p class="subtitle">ADHD time &amp; focus tracker</p>
      </div>
    </div>
    <div class="side-nav-links">
      <button class="tab-btn" [class.active]="activeTab === 'today'" (click)="activeTab = 'today'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Today</span>
      </button>
      <button class="tab-btn" [class.active]="activeTab === 'week'" (click)="activeTab = 'week'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="m9 16 2 2 4-4"/></svg>
        <span>Week</span>
      </button>
      <button class="tab-btn" [class.active]="activeTab === 'tasks'" (click)="activeTab = 'tasks'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Tasks</span>
      </button>
      <button class="tab-btn" [class.active]="activeTab === 'stats'" (click)="activeTab = 'stats'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        <span>Insights</span>
      </button>
      <button class="tab-btn" [class.active]="activeTab === 'learn'" (click)="activeTab = 'learn'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/></svg>
        <span>Learn</span>
      </button>
    </div>
    <div class="side-nav-footer">
      <button class="btn btn-secondary btn-icon" (click)="toggleDarkMode()" [title]="isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
        <svg *ngIf="isDarkMode" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg *ngIf="!isDarkMode" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <button class="btn btn-secondary btn-icon" (click)="isSettingsOpen = true" title="Settings & Sync">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </nav>

  <div class="container dashboard-layout">
    <!-- 1. MAIN DASHBOARD CONTENT AREA -->
    <div class="dashboard-content">
      <!-- VIEW A: TODAY TAB — full 24h timeline for the selected date -->
      <div *ngIf="activeTab === 'today'" class="today-tab-container">
        <button *ngIf="selectedDate !== todayDate" class="btn btn-secondary back-to-today-btn" (click)="handleReturnToToday()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          Back to Today
        </button>

        <!-- Morning ritual: only for today's own record, only until completed/skipped -->
        <app-morning-ritual
          *ngIf="selectedDate === todayDate && showMorningRitual"
          [initialPriority]="todayViewRecord?.morningPriority || ''"
          (done)="handleMorningRitualDone($event)"
          (skip)="handleSkipMorningRitual()"
        ></app-morning-ritual>

        <!-- Hourly quick-log: only relevant for today -->
        <app-hourly-quick-log
          *ngIf="selectedDate === todayDate"
          [hourIndex]="quickLogHourIndex"
          [categories]="settings.categories"
          (logHour)="handleQuickLogHour($event)"
          (dismiss)="handleDismissQuickLog()"
        ></app-hourly-quick-log>

        <!-- STEP 21: backwards milestones due on this date -->
        <div class="milestones-due-banner card" *ngIf="milestonesDueToday.length > 0">
          <span class="milestones-due-label">🎯 Due {{ selectedDate === todayDate ? 'today' : 'this day' }}</span>
          <div class="milestones-due-list">
            <div class="milestones-due-item" *ngFor="let m of milestonesDueToday">
              <span>{{ m.text }}</span>
              <button class="btn btn-secondary btn-sm" (click)="handleMilestoneDone(m.id)">Done</button>
            </div>
          </div>
        </div>

        <!-- STEP 17: 2-minute instant-win lane -->
        <div class="two-min-lane" *ngIf="selectedDate === todayDate && twoMinuteTasks.length > 0">
          <span class="two-min-lane-label">⚡ Quick wins</span>
          <div class="two-min-chips">
            <button
              *ngFor="let task of twoMinuteTasks"
              class="two-min-chip"
              (click)="handleCompleteTwoMinuteTask(task.id)"
            >{{ task.text }}</button>
          </div>
        </div>

        <app-today-view
          [date]="selectedDate"
          [record]="todayViewRecord"
          [categories]="settings.categories"
          [activeCategoryId]="activeCategoryId"
          (paintHour)="handlePaintCell($event)"
          (updateNotes)="handleUpdateNotes($event)"
          (updateBingeCount)="handleUpdateBingeCount($event)"
          (plannedBlocksChange)="handlePlannedBlocksChange($event.date, $event.blocks)"
          (focusPlanner)="scrollToPlanner()"
        ></app-today-view>

        <!-- Now + Next planner, scoped to whichever date is being viewed -->
        <app-planner-panel
          id="planner-panel-anchor"
          [blocks]="todayViewRecord?.plannedBlocks || []"
          (blocksChange)="handlePlannedBlocksChange(selectedDate, $event)"
        ></app-planner-panel>

        <!-- Focus timer + hyperfocus guard, and temptation-bundling reward bank -->
        <app-focus-timer
          *ngIf="selectedDate === todayDate"
          (focusBlockCompleted)="handleFocusBlockCompleted()"
          (thoughtParked)="handleThoughtParked($event)"
        ></app-focus-timer>

        <app-reward-bank
          *ngIf="selectedDate === todayDate"
          [bank]="rewardBank"
          (bankChange)="handleRewardBankChange($event)"
          (spent)="handleRewardSpent($event)"
        ></app-reward-bank>

        <!-- Evening ritual: only for today's own record, only from 20:00 -->
        <app-evening-ritual
          *ngIf="selectedDate === todayDate && showEveningRitual"
          [startHour]="eveningRitualHour"
          (startHourChange)="handleEveningRitualHourChange($event)"
          (done)="handleEveningRitualDone($event)"
          (skip)="handleSkipEveningRitual()"
        ></app-evening-ritual>

        <!-- FLOATING PALETTE BAR -->
        <div class="bottom-palette-bar">
          <app-category-picker
            [layout]="'inline'"
            [categories]="settings.categories"
            [activeCategoryId]="activeCategoryId"
            (selectCategory)="activeCategoryId = $event"
            (addCategory)="handleAddCategory($event)"
            (updateCategory)="handleUpdateCategory($event)"
            (deleteCategory)="handleDeleteCategory($event)"
          ></app-category-picker>
        </div>
      </div>

      <!-- VIEW B: WEEK TAB — 7-day rhythm view -->
      <app-week-view
        *ngIf="activeTab === 'week'"
        [dates]="weekDates"
        [records]="records"
        [categories]="settings.categories"
        [tasks]="tasks"
        (prevWeek)="handlePrevWeek()"
        (nextWeek)="handleNextWeek()"
        (openDay)="handleOpenWeekDay($event)"
      ></app-week-view>

      <!-- VIEW T: TASKS TAB — brain-dump inbox + task shredder -->
      <app-task-inbox
        *ngIf="activeTab === 'tasks'"
        [tasks]="tasks"
        (tasksChange)="handleTasksChange($event)"
        (scheduleTask)="handleScheduleTask($event)"
      ></app-task-inbox>

      <!-- VIEW C: STATS / INSIGHTS TAB — long-range aggregates only -->
      <app-stats-dashboard
        *ngIf="activeTab === 'stats'"
        [dates]="dates"
        [records]="records"
        [categories]="settings.categories"
      ></app-stats-dashboard>

      <!-- VIEW D: LEARN (EMBEDDED ADHD KNOWLEDGE BASE) -->
      <div *ngIf="activeTab === 'learn'" class="learn-view">
        <iframe
          #kbFrame
          class="kb-frame"
          src="adhd-knowledge-base.html"
          title="ADHD — The Complete Knowledge Base"
          loading="lazy"
          (load)="syncKnowledgeBaseTheme()"
        ></iframe>
      </div>
    </div>

    <!-- 2. MOBILE BOTTOM TAB BAR (<1000px) -->
    <div class="tab-container">
      <button class="tab-btn" [class.active]="activeTab === 'today'" (click)="activeTab = 'today'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Today</span>
      </button>

      <button class="tab-btn" [class.active]="activeTab === 'week'" (click)="activeTab = 'week'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="m9 16 2 2 4-4"/></svg>
        <span>Week</span>
      </button>

      <button class="tab-btn" [class.active]="activeTab === 'tasks'" (click)="activeTab = 'tasks'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Tasks</span>
      </button>

      <button class="tab-btn" [class.active]="activeTab === 'stats'" (click)="activeTab = 'stats'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        <span>Insights</span>
      </button>

      <button class="tab-btn" [class.active]="activeTab === 'learn'" (click)="activeTab = 'learn'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/></svg>
        <span>Learn</span>
      </button>
    </div>

    <!-- 3. COMPACT CONTROLS HEADER (mobile only — desktop uses the sidebar) -->
    <app-header
      class="mobile-only-header"
      [dateRangeText]="getDateRangeText()"
      [syncState]="syncState"
      [isSyncEnabled]="settings.syncEnabled"
      [isDarkMode]="isDarkMode"
      (toggleDarkMode)="toggleDarkMode()"
      (prevPeriod)="handlePrevPeriod()"
      (nextPeriod)="handleNextPeriod()"
      (resetPeriod)="handleResetPeriod()"
      (openSettings)="isSettingsOpen = true"
    ></app-header>

    <!-- 4. DATABASE SETTINGS MODAL -->
    <app-settings-modal
      *ngIf="isSettingsOpen"
      [supabaseUrl]="settings.supabaseUrl"
      [supabaseAnonKey]="settings.supabaseAnonKey"
      [syncEnabled]="settings.syncEnabled"
      (close)="isSettingsOpen = false"
      (saveSettings)="handleSaveSettings($event)"
      (exportData)="handleExportData()"
      (importData)="handleImportData($event)"
    ></app-settings-modal>
  </div>
</div>
